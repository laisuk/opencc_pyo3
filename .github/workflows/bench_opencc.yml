name: Benchmark opencc_pyo3

on:
  workflow_dispatch:

jobs:
  benchmark:
    name: Benchmark on ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tooling
        run: python -m pip install --upgrade pip maturin

      - name: Install benchmark dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r bench/requirements.txt

      - name: Build local wheel
        run: |
          maturin build --release --out dist

      - name: Install local wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl

      #      - name: Install PyPI opencc-pyo3
      #        run: |
      #          python -m pip install --force-reinstall "opencc-pyo3==0.8.10"
      #          python -m pip show opencc-pyo3

      - name: Validate zh-Hans benchmark samples
        run: python bench/opencc_benchmark_md.py --validate-text-only

      - name: Collect runner environment info
        run: |
          echo "## CI Environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY

          echo "| OS | $(uname -a) |" >> $GITHUB_STEP_SUMMARY
          echo "| CPU | $(lscpu | grep 'Model name' | sed 's/Model name:\s*//') |" >> $GITHUB_STEP_SUMMARY
          echo "| Cores | $(nproc) |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory | $(free -h | awk '/Mem:/ {print $2}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | $(python --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust | $(rustc --version) |" >> $GITHUB_STEP_SUMMARY

      - name: Run benchmark
        run: >-
          python bench/opencc_benchmark_md.py
          --ci
          --configs s2t s2tw s2twp
          --sizes Small Medium Large XLarge
          --export md json
          --output-dir bench/out
          --github-step-summary

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencc-benchmark-ubuntu-latest
          path: bench/out/*
          if-no-files-found: error
